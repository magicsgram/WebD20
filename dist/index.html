<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D6/D8/D12/D20 WebDice</title>
    <script type="module" crossorigin src="/assets/index-n823DKZg.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D5EcRi_Q.css">

  <body>
    <div class="layout">
      <!-- 3D viewport -->
      <div id="canvas-container" aria-label="3D dice viewport"></div>

      <!-- Side panel -->
      <aside class="side-panel">
        <section class="panel">
          <label for="dice-count">Number of dice</label>
          <div class="count-row">
            <select id="dice-count" aria-label="Number of dice"></select>
            <button id="set-all-d6" class="quick-btn" type="button">All D6</button>
            <button id="set-all-d8" class="quick-btn" type="button">All D8</button>
            <button id="set-all-d12" class="quick-btn" type="button">All D12</button>
            <button id="set-all-d20" class="quick-btn" type="button">All D20</button>
          </div>

          <div id="dice-configs" class="dice-configs"></div>
        </section>

        <section class="panel results-panel" aria-live="polite">
          <h2>Results</h2>
          <ul id="results-list"></ul>
          <p id="total"></p>
        </section>
      </aside>
    </div>
  </body>
